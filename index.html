<!doctype html>
<html lang="it" data-theme="dark">
  <head>
    <!-- Cattura beforeinstallprompt prima che React carichi (race condition fix) -->
    <script>
      window.__deferredInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__deferredInstallPrompt = e;
      });
    </script>
    <script>
      (function(){
        var th = 'dark';
        try {
          var s = localStorage.getItem('flow-theme');
          if (s === 'light' || s === 'dark') th = s;
        } catch (e) {}
        document.documentElement.setAttribute('data-theme', th);
        if (th === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
        try { localStorage.removeItem('userTheme'); localStorage.removeItem('theme'); } catch(e){}

        if(location.search.includes('nocache=1')){
          var clr = function(){
            var p = [];
            if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
              p.push(navigator.serviceWorker.getRegistrations().then(function(r){ return Promise.all(r.map(function(s){return s.unregister();})); }));
            }
            if (window.caches && window.caches.keys) {
              p.push(caches.keys().then(function(keys){ return Promise.all(keys.map(function(k){return caches.delete(k);})); }));
            }
            Promise.all(p).then(function(){ location.replace(location.pathname+(location.hash||'')||'/'); });
          };
          clr();
          return;
        }

        /* Cache-bust unificato: confronta la versione BUILD (iniettata da Vite) con localStorage.
           Se l'app.html servito dal SW è vecchio, la versione BUILD è quella VECCHIA e il confronto
           fallisce. Per questo facciamo SUBITO un fetch diretto a /app-version.txt (bypassando SW
           con cache: 'no-store') per ottenere la versione REALE dal server. */
        var BUILD_VERSION = '__INJECTED_CACHE_VERSION__';
        var isBuildVersion = BUILD_VERSION !== ('__INJECTED' + '_CACHE_VERSION__');

        function clearAllAndReload(newVer) {
          try { localStorage.setItem('app_cache_version', newVer); } catch(e){}
          var p = [];
          if (navigator.serviceWorker && navigator.serviceWorker.getRegistrations) {
            p.push(navigator.serviceWorker.getRegistrations().then(function(r){ return Promise.all(r.map(function(s){ return s.unregister(); })); }));
          }
          if (window.caches && window.caches.keys) {
            p.push(caches.keys().then(function(keys){ return Promise.all(keys.map(function(k){ return caches.delete(k); })); }));
          }
          Promise.all(p).then(function(){ location.reload(); });
        }

        /* Se abbiamo una versione BUILD valida, confrontala subito con localStorage */
        if (isBuildVersion) {
          var saved;
          try { saved = localStorage.getItem('app_cache_version'); } catch(e){}
          if (saved !== BUILD_VERSION) {
            clearAllAndReload(BUILD_VERSION);
            return;
          }
        }

        /* Fallback: fetch diretto a /app-version.txt con retry in caso di fallimento.
           Questo è CRUCIALE su iOS PWA dove il fetch potrebbe fallire la prima volta. */
        if ('fetch' in window) {
          var attempts = 0;
          var maxAttempts = 3;
          var delay = 100;
          function fetchVersion() {
            var bust = 't=' + Date.now() + '_' + Math.random().toString(36).slice(2, 6);
            fetch('/app-version.txt?' + bust, { cache: 'no-store' })
              .then(function (r) {
                if (!r.ok) return null;
                return r.text();
              })
              .then(function (net) {
                if (!net) return;
                var v = (net + '').trim();
                if (v.length > 120 || v.indexOf('<') >= 0 || v.indexOf('\n') >= 0) return;
                var s = null;
                try { s = localStorage.getItem('app_cache_version'); } catch (e) {}
                if (v && v !== s) {
                  clearAllAndReload(v);
                }
              })
              .catch(function () {
                /* Retry con backoff esponenziale - iOS PWA spesso fallisce il primo fetch */
                attempts++;
                if (attempts < maxAttempts) {
                  setTimeout(fetchVersion, delay);
                  delay *= 2;
                }
              });
          }
          fetchVersion();
        }
      })();
    </script>
    <script>
      /* Forza reload quando il nuovo service worker prende controllo — fix iOS PWA stuck on old version */
      (function () {
        if (!('serviceWorker' in navigator)) return;
        /* Quando il SW cambia controller (nuovo SW attivato con skipWaiting), ricarica la pagina */
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          window.location.reload();
        });
        /* Ogni volta che l'app torna in primo piano, chiedi al SW di controllare aggiornamenti */
        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState === 'visible') {
            navigator.serviceWorker.getRegistration().then(function (reg) {
              if (reg) reg.update();
            }).catch(function () {});
          }
        });
      })();
    </script>
    <script>
      (function () {
        try {
          var w = typeof window.innerWidth === 'number' ? window.innerWidth : 800;
          var eff = w < 768 ? 'compact' : 'comfortable';
          var vc = w < 640 ? 'phone' : w < 1024 ? 'tablet' : 'desktop';
          document.documentElement.setAttribute('data-layout-preset', 'auto');
          document.documentElement.setAttribute('data-layout-effective', eff);
          document.documentElement.setAttribute('data-viewport-class', vc);
        } catch (e) {}
      })();
    </script>

    <!-- PWA Manifest (iniettato da vite-plugin-pwa) -->

    <!-- Versione app — leggibile in DevTools > Elements; generata da Vite build -->
    <meta name="app-version" content="__APP_VERSION__" />

    <!-- Theme FLOW -->
    <meta name="color-scheme" content="only light" />
    <meta name="theme-color" content="#0a0a0c" />
    <meta name="msapplication-TileColor" content="#0a0a0c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent → status bar trasparente, app a tutto schermo -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="FLOW" />

    <!-- Fonts: preconnect anticipato per ridurre TTFB sui sottodomini Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--
      Inter (font UI principale): non-blocking via preload → onload swap.
      display=swap già nel URL: il testo è leggibile con font di sistema
      prima che Inter sia scaricato, senza layout shift bloccante.
    -->
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      onload="this.rel='stylesheet'">
    <!--
      Font decorativi (header tipografico): caricati dopo il primo paint,
      non bloccano FCP né LCP.
    -->
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Parisienne&family=Great+Vibes&family=Playfair+Display:wght@700;800&family=Montserrat:wght@700;800&display=swap"
      onload="this.rel='stylesheet'">
    <!-- Fallback per browser senza JS (non blocca il rendering nel caso normale) -->
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Parisienne&family=Great+Vibes&family=Playfair+Display:wght@700;800&family=Montserrat:wght@700;800&display=swap">
    </noscript>

    <!-- Meta -->
    <title>FLOW — Work in Motion</title>
    <meta name="description" content="FLOW — Sistema di gestione turni e presenze. Work in Motion." />
    <meta property="og:title" content="FLOW — Work in Motion" />

    <meta property="og:url" content="https://flow-workinmotion.vercel.app" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://flow-workinmotion.vercel.app/flow-app-icon.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:type" content="image/png" />
    <script>
      (function () {
        var origin = window.location.origin;
        var u = document.querySelector('meta[property="og:url"]');
        if (u) u.setAttribute('content', origin);
        var im = document.querySelector('meta[property="og:image"]');
        if (im) im.setAttribute('content', origin + '/og-image.png');
      })();
    </script>
