<!doctype html>
<html lang="it">
  <head>
    <script>
      (function(){
        var t=localStorage.getItem('userTheme')||localStorage.getItem('theme');
        document.documentElement.classList.toggle('dark',t==='dark');
        if(location.search.includes('nocache=1')){
          Promise.all([
            navigator.serviceWorker?.getRegistrations?.().then(function(r){ return Promise.all(r.map(function(s){return s.unregister();})); })||Promise.resolve(),
            caches.keys().then(function(keys){ return Promise.all(keys.map(function(k){return caches.delete(k);})); })
          ]).then(function(){ location.replace(location.pathname+(location.hash||'')||'/'); });
          return;
        }
      })();
    </script>
    <script>
      (function () {
        try {
          var w = typeof window.innerWidth === 'number' ? window.innerWidth : 800;
          var eff = w < 768 ? 'compact' : 'comfortable';
          var vc = w < 480 ? 'phone' : w < 1024 ? 'tablet' : 'desktop';
          document.documentElement.setAttribute('data-layout-preset', 'auto');
          document.documentElement.setAttribute('data-layout-effective', eff);
          document.documentElement.setAttribute('data-viewport-class', vc);
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA Manifest (iniettato da vite-plugin-pwa) -->

    <!-- Theme basilico: stesso verde su light/dark → barra di sistema uniforme con il brand -->
    <meta name="theme-color" content="#2D5A27" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#2D5A27" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Osteria Basilico" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Parisienne&display=swap"
      rel="stylesheet"
    />

    <!-- Meta -->
    <title>Osteria Basilico</title>
    <meta name="description" content="Sistema di gestione turni per Osteria Basilico" />

    <!-- Splash avvio: gradiente + card vetro (stesso linguaggio dell’app), solo CSS -->
    <style>
      #pwa-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483646;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        padding: max(1rem, env(safe-area-inset-top, 0px), env(safe-area-inset-bottom, 0px))
          max(1rem, env(safe-area-inset-left, 0px), env(safe-area-inset-right, 0px));
        transition: opacity 0.38s ease, visibility 0.38s ease;
        background: linear-gradient(155deg, #f8fafc 0%, #ffffff 42%, rgba(45, 90, 39, 0.07) 100%);
      }
      html.dark #pwa-splash {
        background: linear-gradient(155deg, #0a0a0a 0%, #171717 48%, rgba(45, 90, 39, 0.1) 100%);
      }
      #pwa-splash.pwa-splash--hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #pwa-splash .pwa-splash__brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        max-width: min(92vw, 20rem);
        gap: clamp(0.85rem, 3vw, 1.15rem);
        padding: clamp(1.35rem, 4.5vw, 1.75rem) clamp(1.25rem, 4vw, 1.5rem);
        border-radius: 1rem;
        border: 1px solid rgba(226, 232, 240, 0.88);
        background: rgba(255, 255, 255, 0.88);
        box-shadow:
          0 4px 6px -1px rgba(15, 23, 42, 0.06),
          0 12px 40px -12px rgba(15, 23, 42, 0.2),
          0 0 0 1px rgba(45, 90, 39, 0.04);
        -webkit-backdrop-filter: blur(20px) saturate(1.12);
        backdrop-filter: blur(20px) saturate(1.12);
      }
      html.dark #pwa-splash .pwa-splash__brand {
        border-color: rgba(255, 255, 255, 0.1);
        background: rgba(23, 23, 23, 0.88);
        box-shadow: 0 12px 48px -12px rgba(0, 0, 0, 0.55);
      }
      #pwa-splash .pwa-splash__logo-shell {
        display: flex;
        align-items: center;
        justify-content: center;
        width: min(44vw, 7.5rem);
        max-width: 132px;
        aspect-ratio: 1;
        border-radius: 1.75rem;
        background: rgba(45, 90, 39, 0.1);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.35);
      }
      html.dark #pwa-splash .pwa-splash__logo-shell {
        background: rgba(45, 90, 39, 0.16);
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }
      #pwa-splash .pwa-splash__logo {
        display: block;
        width: 52%;
        height: auto;
        max-height: 58%;
        object-fit: contain;
        opacity: 0;
        transform: translate3d(0, 28px, 0) scale(0.96);
        animation: pwa-splash-logo-in 1.15s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        will-change: transform, opacity;
      }
      /* Snell solo su Apple; Parisienne (webfont) su Windows/Android senza Snell */
      #pwa-splash .pwa-splash__title {
        font-family: "Snell Roundhand", "Parisienne", "Brush Script MT", "Apple Chancery", "Segoe Script", cursive;
        font-weight: 400;
        font-synthesis: none;
        font-size: clamp(1.5rem, 5.8vw, 1.95rem);
        color: #2d5a27;
        letter-spacing: 0.03em;
        line-height: 1.08;
        text-align: center;
        width: 100%;
        padding: 0 0.35rem;
        margin: 0;
        opacity: 0;
        transform: translate3d(0, 8px, 0);
        animation: pwa-splash-title-in 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.42s forwards;
      }
      html.dark #pwa-splash .pwa-splash__title {
        color: #d0dece;
      }
      @keyframes pwa-splash-logo-in {
        from {
          opacity: 0;
          transform: translate3d(0, 28px, 0) scale(0.96);
        }
        to {
          opacity: 1;
          transform: translate3d(0, 0, 0) scale(1);
        }
      }
      @keyframes pwa-splash-title-in {
        from {
          opacity: 0;
          transform: translate3d(0, 8px, 0);
        }
        to {
          opacity: 1;
          transform: translate3d(0, 0, 0);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #pwa-splash .pwa-splash__logo,
        #pwa-splash .pwa-splash__title {
          animation: none;
          opacity: 1;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="pwa-splash" aria-hidden="true">
      <div class="pwa-splash__brand">
        <div class="pwa-splash__logo-shell" aria-hidden="true">
          <img
            class="pwa-splash__logo"
            src="/logo-ob.svg"
            width="512"
            height="512"
            alt=""
            decoding="async"
            fetchpriority="high"
          />
        </div>
        <p class="pwa-splash__title" lang="it">Osteria Basilico</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
