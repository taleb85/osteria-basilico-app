<!doctype html>
<html lang="it" data-theme="dark">
  <head>
    <!-- Cattura beforeinstallprompt prima che React carichi (race condition fix) -->
    <script>
      window.__deferredInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__deferredInstallPrompt = e;
      });
    </script>
    <script>
      (function(){
        /* Tema: flow-theme in localStorage (allineato a useTheme in React) */
        var th = 'dark';
        try {
          var s = localStorage.getItem('flow-theme');
          if (s === 'light' || s === 'dark') th = s;
        } catch (e) {}
        document.documentElement.setAttribute('data-theme', th);
        if (th === 'dark') document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
        try { localStorage.removeItem('userTheme'); localStorage.removeItem('theme'); } catch(e){}

        /* Cache-bust: `__INJECTED_CACHE_VERSION__` sostituito da Vite in build (vedi inject-version-meta) */
        var CURRENT_VERSION = '__INJECTED_CACHE_VERSION__';
        try {
          var savedVersion = localStorage.getItem('app_cache_version');
          if (savedVersion !== CURRENT_VERSION) {
            localStorage.setItem('app_cache_version', CURRENT_VERSION);
            /* Cancella cache SW + HTTP cache API */
            Promise.all([
              navigator.serviceWorker?.getRegistrations?.().then(function(r){
                return Promise.all(r.map(function(s){ return s.unregister(); }));
              }) || Promise.resolve(),
              caches.keys().then(function(keys){
                return Promise.all(keys.map(function(k){ return caches.delete(k); }));
              })
            ]).then(function(){
              /* Hard-reload: forza il browser a ri-scaricare index.html e tutti i chunk */
              location.reload();
            });
            return;
          }
        } catch(e){}

        if(location.search.includes('nocache=1')){
          Promise.all([
            navigator.serviceWorker?.getRegistrations?.().then(function(r){ return Promise.all(r.map(function(s){return s.unregister();})); })||Promise.resolve(),
            caches.keys().then(function(keys){ return Promise.all(keys.map(function(k){return caches.delete(k);})); })
          ]).then(function(){ location.replace(location.pathname+(location.hash||'')||'/'); });
          return;
        }
      })();
    </script>
    <script>
      /* Se l'index in cache (PWA) è vecchio ma /app-version.txt sul server no: allinea cache e reload */
      (function () {
        if (!('fetch' in window)) return;
        function run() {
          var bust = 't=' + Date.now();
          fetch('/app-version.txt?' + bust, { cache: 'no-store' })
            .then(function (r) { if (!r.ok) return null; return r.text(); })
            .then(function (net) {
              if (!net) return;
              var v = (net + '').trim();
              /* No HTML/SPA-fallback: se risposta non sembra "x.y.z-…+build", ignora (es. errori/proxy) */
              if (v.length > 120 || v.indexOf('<') >= 0 || v.indexOf('\n') >= 0) return;
              var s = null;
              try { s = localStorage.getItem('app_cache_version'); } catch (e) {}
              if (v && v !== s) {
                try { localStorage.setItem('app_cache_version', v); } catch (e) {}
                Promise.all([
                  (navigator.serviceWorker && navigator.serviceWorker.getRegistrations)
                    ? navigator.serviceWorker.getRegistrations().then(function (regs) {
                        return Promise.all(regs.map(function (r) { return r.unregister(); }));
                      })
                    : Promise.resolve(),
                  (window.caches && window.caches.keys)
                    ? window.caches.keys().then(function (keys) {
                        return Promise.all(keys.map(function (k) { return window.caches.delete(k); }));
                      })
                    : Promise.resolve()
                ]).then(function () { window.location.reload(); });
              }
            })
            .catch(function () { /* rete o fallimento: ignora */ });
        }
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
          setTimeout(run, 0);
        } else {
          document.addEventListener('DOMContentLoaded', function () { setTimeout(run, 0); });
        }
      })();
    </script>
    <script>
      /* Forza reload quando il nuovo service worker prende controllo — fix iOS PWA stuck on old version */
      (function () {
        if (!('serviceWorker' in navigator)) return;
        /* Quando il SW cambia controller (nuovo SW attivato con skipWaiting), ricarica la pagina */
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          window.location.reload();
        });
        /* Ogni volta che l'app torna in primo piano, chiedi al SW di controllare aggiornamenti */
        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState === 'visible') {
            navigator.serviceWorker.getRegistration().then(function (reg) {
              if (reg) reg.update();
            }).catch(function () {});
          }
        });
      })();
    </script>
    <script>
      (function () {
        try {
          var w = typeof window.innerWidth === 'number' ? window.innerWidth : 800;
          var eff = w < 768 ? 'compact' : 'comfortable';
          var vc = w < 640 ? 'phone' : w < 1024 ? 'tablet' : 'desktop';
          document.documentElement.setAttribute('data-layout-preset', 'auto');
          document.documentElement.setAttribute('data-layout-effective', eff);
          document.documentElement.setAttribute('data-viewport-class', vc);
        } catch (e) {}
      })();
    </script>

    <!-- PWA Manifest (iniettato da vite-plugin-pwa) -->

    <!-- Versione app — leggibile in DevTools > Elements; generata da Vite build -->

    <!-- Theme FLOW -->

    <meta name="theme-color" content="#0d3b6e" />
    <meta name="msapplication-TileColor" content="#0d3b6e" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="FLOW" />

    <!-- Fonts: preconnect anticipato per ridurre TTFB sui sottodomini Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--
      Inter (font UI principale): non-blocking via preload → onload swap.
      display=swap già nel URL: il testo è leggibile con font di sistema
      prima che Inter sia scaricato, senza layout shift bloccante.
    -->
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      onload="this.rel='stylesheet'">
    <!--
      Font decorativi (header tipografico): caricati dopo il primo paint,
      non bloccano FCP né LCP.
    -->
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Parisienne&family=Great+Vibes&family=Playfair+Display:wght@700;800&family=Montserrat:wght@700;800&display=swap"
      onload="this.rel='stylesheet'">
    <!-- Fallback per browser senza JS (non blocca il rendering nel caso normale) -->
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Parisienne&family=Great+Vibes&family=Playfair+Display:wght@700;800&family=Montserrat:wght@700;800&display=swap">
    </noscript>

    <script>
      (function () {
        var origin = window.location.origin;
        var u = document.querySelector('meta[property="og:url"]');
        if (u) u.setAttribute('content', origin);
        var im = document.querySelector('meta[property="og:image"]');
        if (im) im.setAttribute('content', origin + '/og-image.png');
      })();
    </script>
