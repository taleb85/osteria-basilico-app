<!doctype html>
<html lang="it">
  <head>
    <script>
      (function(){
        var t=localStorage.getItem('userTheme')||localStorage.getItem('theme');
        if(t==='dark'||t==='light'){
          document.documentElement.classList.toggle('dark',t==='dark');
        } else {
          var sysDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          document.documentElement.classList.toggle('dark', sysDark);
        }
        if(location.search.includes('nocache=1')){
          Promise.all([
            navigator.serviceWorker?.getRegistrations?.().then(function(r){ return Promise.all(r.map(function(s){return s.unregister();})); })||Promise.resolve(),
            caches.keys().then(function(keys){ return Promise.all(keys.map(function(k){return caches.delete(k);})); })
          ]).then(function(){ location.replace(location.pathname+(location.hash||'')||'/'); });
          return;
        }
      })();
    </script>
    <script>
      (function () {
        try {
          var w = typeof window.innerWidth === 'number' ? window.innerWidth : 800;
          var eff = w < 768 ? 'compact' : 'comfortable';
          var vc = w < 480 ? 'phone' : w < 1024 ? 'tablet' : 'desktop';
          document.documentElement.setAttribute('data-layout-preset', 'auto');
          document.documentElement.setAttribute('data-layout-effective', eff);
          document.documentElement.setAttribute('data-viewport-class', vc);
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Favicon: SVG prioritario, query param per busting cache per-sede -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg?v=%VITE_TENANT_SLUG%" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=%VITE_TENANT_SLUG%" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA Manifest (iniettato da vite-plugin-pwa) -->

    <!-- Theme basilico: stesso verde su light/dark → barra di sistema uniforme con il brand -->
    <meta name="theme-color" content="#2D5A27" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#2D5A27" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="%VITE_APP_TITLE%" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Parisienne&display=swap"
      rel="stylesheet"
    />

    <!-- Meta -->
    <title>%VITE_APP_TITLE%</title>
    <meta name="description" content="Sistema di gestione per %VITE_APP_TITLE%" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
