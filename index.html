<!doctype html>
<html lang="it">
  <head>
    <!-- Cattura beforeinstallprompt prima che React carichi (race condition fix) -->
    <script>
      window.__deferredInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__deferredInstallPrompt = e;
      });
    </script>
    <script>
      (function(){
        /* Tema fisso: solo Light. Rimuove classe dark e pulisce preferenze precedenti. */
        document.documentElement.classList.remove('dark');
        try { localStorage.removeItem('userTheme'); localStorage.removeItem('theme'); } catch(e){}

        /* Cache-bust automatico: versione iniettata da Vite build */
        var CURRENT_VERSION = window.__APP_CACHE_VERSION__ || '2.0.4';
        try {
          var savedVersion = localStorage.getItem('app_cache_version');
          if (savedVersion !== CURRENT_VERSION) {
            localStorage.setItem('app_cache_version', CURRENT_VERSION);
            /* Cancella cache SW + HTTP cache API */
            Promise.all([
              navigator.serviceWorker?.getRegistrations?.().then(function(r){
                return Promise.all(r.map(function(s){ return s.unregister(); }));
              }) || Promise.resolve(),
              caches.keys().then(function(keys){
                return Promise.all(keys.map(function(k){ return caches.delete(k); }));
              })
            ]).then(function(){
              /* Hard-reload: forza il browser a ri-scaricare index.html e tutti i chunk */
              location.reload();
            });
            return;
          }
        } catch(e){}

        if(location.search.includes('nocache=1')){
          Promise.all([
            navigator.serviceWorker?.getRegistrations?.().then(function(r){ return Promise.all(r.map(function(s){return s.unregister();})); })||Promise.resolve(),
            caches.keys().then(function(keys){ return Promise.all(keys.map(function(k){return caches.delete(k);})); })
          ]).then(function(){ location.replace(location.pathname+(location.hash||'')||'/'); });
          return;
        }
      })();
    </script>
    <script>
      /* Forza reload quando il nuovo service worker prende controllo — fix iOS PWA stuck on old version */
      (function () {
        if (!('serviceWorker' in navigator)) return;
        /* Quando il SW cambia controller (nuovo SW attivato con skipWaiting), ricarica la pagina */
        navigator.serviceWorker.addEventListener('controllerchange', function () {
          window.location.reload();
        });
        /* Ogni volta che l'app torna in primo piano, chiedi al SW di controllare aggiornamenti */
        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState === 'visible') {
            navigator.serviceWorker.getRegistration().then(function (reg) {
              if (reg) reg.update();
            }).catch(function () {});
          }
        });
      })();
    </script>
    <script>
      (function () {
        try {
          var w = typeof window.innerWidth === 'number' ? window.innerWidth : 800;
          var eff = w < 768 ? 'compact' : 'comfortable';
          var vc = w < 480 ? 'phone' : w < 1024 ? 'tablet' : 'desktop';
          document.documentElement.setAttribute('data-layout-preset', 'auto');
          document.documentElement.setAttribute('data-layout-effective', eff);
          document.documentElement.setAttribute('data-viewport-class', vc);
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=0" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico?v=%VITE_TENANT_SLUG%-v8" sizes="any" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png?v=%VITE_TENANT_SLUG%-v8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png?v=%VITE_TENANT_SLUG%-v8" />
    <link rel="icon" type="image/png" sizes="48x48" href="/favicon-48x48.png?v=%VITE_TENANT_SLUG%-v8" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=%VITE_TENANT_SLUG%-v8" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png?v=%VITE_TENANT_SLUG%-v8" />

    <!-- Apple Touch Icon (Safari / iOS — precomposed ha priorità massima) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=%VITE_TENANT_SLUG%-v8" />
    <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/apple-touch-icon.png?v=%VITE_TENANT_SLUG%-v8" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icon-152.png?v=%VITE_TENANT_SLUG%-v8" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icon-167.png?v=%VITE_TENANT_SLUG%-v8" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png?v=%VITE_TENANT_SLUG%-v8" />

    <!-- PWA Manifest (iniettato da vite-plugin-pwa) -->

    <!-- Versione app — leggibile in DevTools > Elements; generata da Vite build -->
    <meta name="app-version" content="__APP_VERSION__" />

    <!-- Theme FLOW -->
    <meta name="color-scheme" content="only light" />
    <!-- theme-color: deve corrispondere esattamente al colore safe area -->
    <meta name="theme-color" content="#0d1f3c" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent → status bar trasparente, app a tutto schermo -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="FLOW" />

    <!-- Fonts: preconnect anticipato per ridurre TTFB sui sottodomini Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!--
      Inter (font UI principale): non-blocking via preload → onload swap.
      display=swap già nel URL: il testo è leggibile con font di sistema
      prima che Inter sia scaricato, senza layout shift bloccante.
    -->
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      onload="this.rel='stylesheet'">
    <!--
      Font decorativi (header tipografico): caricati dopo il primo paint,
      non bloccano FCP né LCP.
    -->
    <link rel="preload" as="style"
      href="https://fonts.googleapis.com/css2?family=Parisienne&family=Great+Vibes&family=Playfair+Display:wght@700;800&family=Montserrat:wght@700;800&display=swap"
      onload="this.rel='stylesheet'">
    <!-- Fallback per browser senza JS (non blocca il rendering nel caso normale) -->
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Parisienne&family=Great+Vibes&family=Playfair+Display:wght@700;800&family=Montserrat:wght@700;800&display=swap">
    </noscript>

    <!-- Meta -->
    <title>FLOW — Work in Motion</title>
    <meta name="description" content="FLOW — Sistema di gestione turni e presenze. Work in Motion." />
    <meta property="og:title" content="FLOW — Work in Motion" />
    <meta property="og:description" content="Gestione turni e presenze per il tuo team." />
    <meta property="og:url" content="https://osteria-basilico-app.vercel.app" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://osteria-basilico-app.vercel.app/flow-app-icon.png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:type" content="image/png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
