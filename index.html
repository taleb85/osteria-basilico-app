<!doctype html>
<html lang="it">
  <head>
    <script>
      (function(){
        var t=localStorage.getItem('userTheme')||localStorage.getItem('theme');
        document.documentElement.classList.toggle('dark',t==='dark');
        if(location.search.includes('nocache=1')){
          Promise.all([
            navigator.serviceWorker?.getRegistrations?.().then(function(r){ return Promise.all(r.map(function(s){return s.unregister();})); })||Promise.resolve(),
            caches.keys().then(function(keys){ return Promise.all(keys.map(function(k){return caches.delete(k);})); })
          ]).then(function(){ location.replace(location.pathname+(location.hash||'')||'/'); });
          return;
        }
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA Manifest (iniettato da vite-plugin-pwa) -->

    <!-- Theme basilico: stesso verde su light/dark → barra di sistema uniforme con il brand -->
    <meta name="theme-color" content="#2D5A27" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#2D5A27" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Osteria Basilico" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Meta -->
    <title>Osteria Basilico</title>
    <meta name="description" content="Sistema di gestione turni per Osteria Basilico" />

    <!-- Splash avvio: animazioni CSS pure (non bloccano il caricamento del bundle) -->
    <style>
      #pwa-splash {
        position: fixed;
        inset: 0;
        z-index: 2147483646;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        box-sizing: border-box;
        background: #ffffff;
        padding: max(1rem, env(safe-area-inset-top, 0px), env(safe-area-inset-bottom, 0px))
          max(1rem, env(safe-area-inset-left, 0px), env(safe-area-inset-right, 0px));
        transition: opacity 0.38s ease, visibility 0.38s ease;
      }
      #pwa-splash.pwa-splash--hide {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }
      #pwa-splash .pwa-splash__brand {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        width: 100%;
        max-width: min(92vw, 22rem);
        gap: clamp(1rem, 3.5vw, 1.35rem);
      }
      #pwa-splash .pwa-splash__logo {
        display: block;
        width: min(52vw, 11.5rem);
        max-width: 200px;
        height: auto;
        aspect-ratio: 1;
        object-fit: contain;
        opacity: 0;
        transform: translate3d(0, 36px, 0);
        animation: pwa-splash-logo-in 1.2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        will-change: transform, opacity;
      }
      #pwa-splash .pwa-splash__title {
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-weight: 600;
        font-size: clamp(0.95rem, 3.8vw, 1.08rem);
        color: #4b5563;
        letter-spacing: 0.05em;
        line-height: 1.35;
        text-align: center;
        width: 100%;
        padding: 0 0.5rem;
        margin: 0;
        opacity: 0;
        animation: pwa-splash-title-fade 0.85s ease-out 0.5s forwards;
      }
      @keyframes pwa-splash-logo-in {
        from {
          opacity: 0;
          transform: translate3d(0, 36px, 0);
        }
        to {
          opacity: 1;
          transform: translate3d(0, 0, 0);
        }
      }
      @keyframes pwa-splash-title-fade {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        #pwa-splash .pwa-splash__logo,
        #pwa-splash .pwa-splash__title {
          animation: none;
          opacity: 1;
          transform: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="pwa-splash" aria-hidden="true">
      <div class="pwa-splash__brand">
        <img
          class="pwa-splash__logo"
          src="/logo-ob.svg"
          width="512"
          height="512"
          alt=""
          decoding="async"
          fetchpriority="high"
        />
        <p class="pwa-splash__title" lang="it">Osteria Basilico</p>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
