<!doctype html>
<html lang="it">
  <head>
    <!-- Cattura beforeinstallprompt prima che React carichi (race condition fix) -->
    <script>
      window.__deferredInstallPrompt = null;
      window.addEventListener('beforeinstallprompt', function(e) {
        e.preventDefault();
        window.__deferredInstallPrompt = e;
      });
    </script>
    <script>
      (function(){
        var t=localStorage.getItem('userTheme')||localStorage.getItem('theme');
        var isDark;
        if(t==='dark'||t==='light'){
          isDark = t==='dark';
        } else {
          isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        }
        document.documentElement.classList.toggle('dark', isDark);
        if (document.body) document.body.style.background = isDark ? '#0a0a0a' : '#f8fafc';
        if(location.search.includes('nocache=1')){
          Promise.all([
            navigator.serviceWorker?.getRegistrations?.().then(function(r){ return Promise.all(r.map(function(s){return s.unregister();})); })||Promise.resolve(),
            caches.keys().then(function(keys){ return Promise.all(keys.map(function(k){return caches.delete(k);})); })
          ]).then(function(){ location.replace(location.pathname+(location.hash||'')||'/'); });
          return;
        }
      })();
    </script>
    <script>
      (function () {
        try {
          var w = typeof window.innerWidth === 'number' ? window.innerWidth : 800;
          var eff = w < 768 ? 'compact' : 'comfortable';
          var vc = w < 480 ? 'phone' : w < 1024 ? 'tablet' : 'desktop';
          document.documentElement.setAttribute('data-layout-preset', 'auto');
          document.documentElement.setAttribute('data-layout-effective', eff);
          document.documentElement.setAttribute('data-viewport-class', vc);
        } catch (e) {}
      })();
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=0" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png?v=%VITE_TENANT_SLUG%-v4" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png?v=%VITE_TENANT_SLUG%-v4" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png?v=%VITE_TENANT_SLUG%-v4" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico?v=%VITE_TENANT_SLUG%-v4" />

    <!-- Apple Touch Icon (Safari / iOS — precomposed ha priorità massima) -->
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=%VITE_TENANT_SLUG%-v4" />
    <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/apple-touch-icon.png?v=%VITE_TENANT_SLUG%-v4" />

    <!-- PWA Manifest (iniettato da vite-plugin-pwa) -->

    <!-- Theme FLOW -->
    <meta name="theme-color" content="#0052FF" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0033BB" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <!-- black-translucent → status bar trasparente, app a tutto schermo -->
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="FLOW" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Parisienne&family=Great+Vibes&family=Playfair+Display:wght@700;800&family=Montserrat:wght@700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Meta -->
    <title>FLOW — Work in Motion</title>
    <meta name="description" content="FLOW — Sistema di gestione turni e presenze. Work in Motion." />
    <meta property="og:title" content="FLOW — Work in Motion" />
    <meta property="og:description" content="Gestione turni e presenze per il tuo team." />
    <meta property="og:url" content="https://flow-workinmotion-app.vercel.app" />
  </head>
