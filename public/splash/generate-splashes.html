<!DOCTYPE html>
<html>
<head><title>Generate Flow Splashes</title></head>
<body>
<script>
const sizes = [
  [750,1334],[1125,2436],[828,1792],[1170,2532],
  [1179,2556],[1536,2048],[1668,2388],[2048,2732]
];
sizes.forEach(([w,h]) => {
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#0d3b6e';
  ctx.fillRect(0,0,w,h);
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold ${w*0.08}px system-ui`;
  ctx.textAlign = 'center';
  ctx.fillText('FLOW', w/2, h/2);
  const a = document.createElement('a');
  a.download = `splash-${w}x${h}.png`;
  a.href = canvas.toDataURL();
  a.textContent = `Download ${w}x${h}`;
  document.body.appendChild(a);
  document.body.appendChild(document.createElement('br'));
});
</script>
</body>
</html>
