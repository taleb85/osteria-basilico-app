name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test Unit
        run: npm run test -- --run

      - name: Build
        run: npm run build
        # La build non richiede VITE_* per compilare (Supabase client può essere null in assenza di env).

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Test E2E
        run: npm run test:e2e
        env:
          CI: true
